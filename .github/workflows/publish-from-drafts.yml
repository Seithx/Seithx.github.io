name: Publish cleaned blog post from drafts (Gemini 2.5 Flash)

on:
  schedule:
    - cron: "0 6 * * 2,5"   # 09:00 IL in summer
    - cron: "0 7 * * 2,5"   # 09:00 IL in winter
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check schedule window (DST-safe)
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch -- proceeding."
            exit 0
          fi
          tz=Asia/Jerusalem
          hh=$(env TZ=$tz date +%H)
          dow=$(env TZ=$tz date +%u)
          echo "Now (IL): $(env TZ=$tz date -Iseconds)"
          if [ "$hh" = "09" ] && { [ "$dow" = "2" ] || [ "$dow" = "5" ]; }; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Window open."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Not 09:00 $tz on Tue/Fri. Skipping."
          fi

  publish:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sweep processed drafts left behind
        run: |
          set -e
          mkdir -p _posts archived_drafts
          grep -Rho '^source_draft:\s*.*' _posts 2>/dev/null | while IFS= read -r line; do
            d=$(sed -E 's/^source_draft:\s*"?([^"]+)"?/\1/' <<<"$line")
            if [ -n "$d" ] && [ -f "$d" ]; then
              git mv -f "$d" archived_drafts/ 2>/dev/null || mv "$d" archived_drafts/
              echo "Swept $d"
            fi
          done

      - name: Find latest unprocessed draft
        id: draft
        run: |
          set -e
          mkdir -p drafts
          latest="$(find drafts -type f ! -name '*.lock' ! -name '.gitkeep' -printf '%T@ %P\n' | sort -nr | head -n1 | cut -d' ' -f2- || true)"
          if [ -z "$latest" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No drafts found."
            exit 0
          fi
          echo "file=$latest" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Found: $latest"

      - name: Stop if no draft
        if: steps.draft.outputs.skip == 'true'
        run: echo "No drafts to publish."

      - name: Lock draft to prevent double-processing
        if: steps.draft.outputs.skip != 'true'
        run: |
          ln "drafts/${{ steps.draft.outputs.file }}" "drafts/${{ steps.draft.outputs.file }}.lock" 2>/dev/null || true

      - name: Skip if this draft already published
        id: dup
        if: steps.draft.outputs.skip != 'true'
        run: |
          mkdir -p _posts archived_drafts
          pat="source_draft: \"drafts/${{ steps.draft.outputs.file }}\""
          if grep -Rqs "$pat" _posts 2>/dev/null; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            git mv -f "drafts/${{ steps.draft.outputs.file }}" archived_drafts/ 2>/dev/null || mv "drafts/${{ steps.draft.outputs.file }}" archived_drafts/
            echo "Draft already published. Archived it."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read draft size
        if: steps.draft.outputs.skip != 'true' && steps.dup.outputs.already != 'true'
        run: |
          bytes=$(wc -c < "drafts/${{ steps.draft.outputs.file }}")
          if [ "$bytes" -gt 800000 ]; then
            echo "Draft too large ($bytes bytes)"
            exit 1
          fi
          echo "Draft bytes: $bytes"

      - name: Generate polished post with Gemini 2.5 Flash
        id: llm
        if: steps.draft.outputs.skip != 'true' && steps.dup.outputs.already != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API }}
          DRAFT_FILE: ${{ steps.draft.outputs.file }}
        run: |
          set -e
          [ -z "$GEMINI_API_KEY" ] && { echo "Missing GEMINI_API_KEY"; exit 1; }

          today=$(date -u +"%Y-%m-%d")

          tmp_draft="$RUNNER_TEMP/draft.json"
          tmp_out="$RUNNER_TEMP/out.json"

          # Convert raw draft to a JSON string safely (no file in repo)
          jq -Rs . < "drafts/$DRAFT_FILE" > "$tmp_draft"
          raw=$(cat "$tmp_draft")

          body=$(jq -n --arg raw "$raw" '{
            systemInstruction:{
              role:"system",
              parts:[{text:"You are a concise editor for a developer'\''s public learning log. Keep the author'\''s voice human and informal. Turn raw notes into a short Markdown blog post (250-450 words) with: a strong H1 title, a crisp intro, 3-6 bullet points for key learnings/struggles, a short reflection, and a one-line Next at the end. On the VERY LAST LINE, output exactly: Tags: tag1, tag2, tag3 (4-6 tags, comma-separated). Output valid Markdown only."}]
            },
            contents:[{
              role:"user",
              parts:[{text:("RAW NOTES:\n"+($raw|fromjson))}]
            }],
            generationConfig:{temperature:0.1,thinkingConfig:{thinkingBudget:-1}}
          }')

          for i in 1 2 3; do
            curl -sf "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" -d "$body" > "$tmp_out" && break || sleep $((i*5))
          done

          err=$(jq -r '.error.message // empty' "$tmp_out"); [ -n "$err" ] && { cat "$tmp_out"; exit 1; }
          text=$(jq -r '[.candidates[0].content.parts[]?.text] | join("\n")' "$tmp_out")
          [ -z "$text" ] || [ "$text" = "null" ] && { echo "Empty model output"; exit 1; }

          # Extract title safely -- sanitize to plain ASCII for shell safety
          title=$(printf '%s\n' "$text" | grep -m1 '^# ' | sed 's/^#\s*//' || true)
          [ -z "$title" ] && title=$(printf '%s\n' "$text" | head -n1 | sed 's/^[#*]\s*//')
          [ -z "$title" ] && title="Untitled"

          # Extract tags from last line if present (e.g., "Tags: AI, Python, ...")
          tag_line=$(printf '%s\n' "$text" | grep -i '^[*_]*Tags:' | tail -n1 || true)
          tags=""
          if [ -n "$tag_line" ]; then
            tags=$(printf '%s' "$tag_line" | sed -E 's/^[*_]*Tags:\s*//i; s/[*_]//g; s/\s*,\s*/, /g')
          fi

          # Write title and tags to temp files to avoid shell injection
          printf '%s' "$title" > "$RUNNER_TEMP/title.txt"
          printf '%s' "$tags" > "$RUNNER_TEMP/tags.txt"

          # Build safe slug from title
          slug=$(sed -E 's/[^a-zA-Z0-9]+/-/g; s/^-+//; s/-+$//' "$RUNNER_TEMP/title.txt" | tr '[:upper:]' '[:lower:]')
          [ -z "$slug" ] && slug="post"

          # Strip H1 title line and tag line from body
          body_md=$(printf '%s\n' "$text" | awk 'NR==1 && /^# /{next} {print}' | sed '/^[*_]*Tags:/d')

          # Read back title safely for frontmatter
          safe_title=$(sed 's/"/\\"/g' "$RUNNER_TEMP/title.txt")
          safe_tags=$(cat "$RUNNER_TEMP/tags.txt")

          mkdir -p _posts
          outfile="_posts/${today}-${slug}.md"

          # Build post file safely using cat heredoc (no variable interpolation in body)
          {
            echo "---"
            echo "layout: post"
            printf 'title: "%s"\n' "$safe_title"
            printf 'date: %s\n' "$today"
            printf 'source_draft: "drafts/%s"\n' "$DRAFT_FILE"
            if [ -n "$safe_tags" ]; then
              printf 'tags: [%s]\n' "$safe_tags"
            fi
            echo "---"
            printf '%s\n' "$body_md"
          } > "$outfile"

          echo "outfile=$outfile" >> "$GITHUB_OUTPUT"
          echo "Wrote $outfile"

      - name: Archive used draft (move before commit)
        if: steps.draft.outputs.skip != 'true' && steps.dup.outputs.already != 'true'
        env:
          DRAFT_FILE: ${{ steps.draft.outputs.file }}
        run: |
          mkdir -p archived_drafts
          git mv -f "drafts/$DRAFT_FILE" archived_drafts/ 2>/dev/null || mv "drafts/$DRAFT_FILE" archived_drafts/
          echo "Archived drafts/$DRAFT_FILE"

      - name: Unlock draft
        if: always() && steps.draft.outputs.skip != 'true'
        run: rm -f "drafts/${{ steps.draft.outputs.file }}.lock"

      - name: Commit & push
        if: steps.draft.outputs.skip != 'true'
        env:
          OUTFILE: ${{ steps.llm.outputs.outfile }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ archived_drafts/ drafts/
          msg="Publish: ${OUTFILE:-sweep-only}"
          git diff --cached --quiet && { echo "Nothing to commit."; exit 0; }
          git commit -m "$msg"
          git pull --rebase origin main || git pull --no-rebase --no-edit origin main
          git push
